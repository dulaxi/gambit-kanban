    /* ── AI shimmer reveal — mirrors src/index.css.
       Text is hidden where the rainbow band hasn't passed yet. The band is
       the leading edge of the reveal, driven by a --reveal CSS variable. ── */
    .ai-shimmer-reveal {
      background: linear-gradient(90deg,
        #1B1B18 calc(var(--reveal, 0%) - 12%),
        #C2D64A calc(var(--reveal, 0%) - 4%),
        #D4A843 calc(var(--reveal, 0%) - 1%),
        #C27A4A calc(var(--reveal, 0%) + 1%),
        #A8969E calc(var(--reveal, 0%) + 4%),
        transparent calc(var(--reveal, 0%) + 12%)
      );
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }

    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>

  <script>
    /* ============================================================
       Teams Thread Demo — sibling of slack-thread-demo.html.
       Same timeline math, same carry-over on the right panel, same
       ease-out-back pop for message entrance. Only the chrome, the
       avatar shape, the channel-header format, and the surrounding
       bg tint differ — everything else is identical so both drafts
       can evolve from the same mental model.

       DOM is built with createElement + textContent. SVG decoration
       is parsed once via DOMParser and cloned per instance so we
       never assign to innerHTML at runtime.
       ============================================================ */

    const SVG_NS = 'http://www.w3.org/2000/svg'

    /* ── Tiny createElement helper ── */
    function h(tag, attrs, children) {
      const el = document.createElement(tag)
      if (attrs) {
        for (const key in attrs) {
          const val = attrs[key]
          if (val === null || val === undefined || val === false) continue
          if (key === 'class') el.className = val
          else if (key === 'style') el.setAttribute('style', val)
          else el.setAttribute(key, val)
        }
      }
      if (children != null) {
        const list = Array.isArray(children) ? children : [children]
        for (const child of list) {
          if (child == null || child === false) continue
          if (typeof child === 'string') el.appendChild(document.createTextNode(child))
          else el.appendChild(child)
        }
      }
      return el
    }

    /* ── Parse a trusted SVG string once; return a clone each call. ── */
    const svgParser = new DOMParser()
    function svgTemplate(svgString) {
      const doc = svgParser.parseFromString(svgString, 'image/svg+xml')
      const node = doc.documentElement
      return () => node.cloneNode(true)
    }

    /* ── Phosphor-style icons for extracted WIP cards ── */
    const phosphorShoppingCart = svgTemplate(`<svg xmlns="${SVG_NS}" width="16" height="16" fill="currentColor" viewBox="0 0 256 256"><path d="M222.14 58.87A8 8 0 0 0 216 56H54.68L49.79 29.14A16 16 0 0 0 34.05 16H16a8 8 0 0 0 0 16h18.05l24.23 133.35a24 24 0 0 0 5.59 11.6 32 32 0 1 0 44.55 5A23.94 23.94 0 0 0 102.5 176h81a24 24 0 0 0 23.61-19.71l14.75-81A8 8 0 0 0 222.14 58.87ZM96 208a16 16 0 1 1-16-16 16 16 0 0 1 16 16Zm96 0a16 16 0 1 1-16-16 16 16 0 0 1 16 16Zm-.25-54.58A8 8 0 0 1 183.5 160h-81a8 8 0 0 1-7.86-6.57L57.57 72h148.79Z"/></svg>`)
    const phosphorShieldCheck = svgTemplate(`<svg xmlns="${SVG_NS}" width="16" height="16" fill="currentColor" viewBox="0 0 256 256"><path d="M208 40H48a16 16 0 0 0-16 16v58.77c0 89.61 75.82 119.34 91 124.39a15.53 15.53 0 0 0 10 0c15.2-5.05 91-34.78 91-124.39V56a16 16 0 0 0-16-16Zm0 74.79c0 78.42-66.35 104.62-80 109.18-13.53-4.51-80-30.69-80-109.18V56h160ZM82.34 141.66a8 8 0 0 1 11.32-11.32L112 148.69l50.34-50.35a8 8 0 0 1 11.32 11.32l-56 56a8 8 0 0 1-11.32 0Z"/></svg>`)
    const phosphorGauge = svgTemplate(`<svg xmlns="${SVG_NS}" width="16" height="16" fill="currentColor" viewBox="0 0 256 256"><path d="M128 40a96 96 0 0 0-84.7 141.45A8 8 0 0 0 50.47 192h155.06a8 8 0 0 0 7.17-10.55A96 96 0 0 0 128 40Zm77.54 136H134.63l36.88-48a8 8 0 0 0-12.68-9.75L115.89 176H50.46a80 80 0 1 1 155.08 0ZM120 88a8 8 0 0 1 16 0v8a8 8 0 0 1-16 0Zm-48 48a8 8 0 0 1 8-8h8a8 8 0 0 1 0 16h-8a8 8 0 0 1-8-8Zm96 0a8 8 0 0 1 8-8h8a8 8 0 0 1 0 16h-8a8 8 0 0 1-8-8Z"/></svg>`)

    const checkCircleIcon = svgTemplate(`<svg xmlns="${SVG_NS}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 shrink-0 text-[#8E8E89]" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>`)
    const alignLeftIcon = svgTemplate(`<svg xmlns="${SVG_NS}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3" aria-hidden="true"><path d="M21 5H3"/><path d="M15 12H3"/><path d="M17 19H3"/></svg>`)
    const calendarIcon = svgTemplate(`<svg xmlns="${SVG_NS}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3" aria-hidden="true"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>`)
    const checkSquareIcon = svgTemplate(`<svg xmlns="${SVG_NS}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3" aria-hidden="true"><path d="M21 10.656V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h12.344"/><path d="m9 11 3 3L22 4"/></svg>`)

    const PHOSPHOR_BY_NAME = {
      'shopping-cart': phosphorShoppingCart,
      'shield-check': phosphorShieldCheck,
      'gauge': phosphorGauge,
    }

    /* ── Data — standup-style WIP updates from 3 different team members.
       No @mentions; the extractor infers each task's assignee from the
       sender of the update. Kolumn routes these to the "In Progress"
       column, not "To Do". ── */
    const TEAMS_MESSAGES = [
      {
        sender: 'Dula',
        initial: 'D',
        avatarBg: '#4B53BF',
        timestamp: '9:12 AM',
        text: 'Standup update — checkout redesign is in good shape. Cart drawer and order summary shipped to preview. Working on the payment step now, should have a full preview link by EOD.',
        mentions: [],
      },
      {
        sender: 'Jamie',
        initial: 'J',
        avatarBg: '#038387',
        timestamp: '9:14 AM',
        text: "On my side — auth service JWT migration is roughly 70% there. Refresh token rotation is working locally, sessions holding across reloads. Just need to swap the mobile endpoints and we're done.",
        mentions: [],
      },
      {
        sender: 'Aaron',
        initial: 'A',
        avatarBg: '#CA5010',
        timestamp: '9:16 AM',
        text: 'Search performance work is paying off — P99 dropped from 800ms to 220ms after the index rebuild. Pushing to staging tomorrow to verify before prod.',
        mentions: [],
      },
    ]

    const LANDING_LABEL_BG = {
      red:    { bg: '#F2D9C7', text: '#8B5A33' },
      blue:   { bg: '#DAE0F0', text: '#4A5578' },
      green:  { bg: '#EEF2D6', text: '#6B7A12' },
      yellow: { bg: '#F5EDCF', text: '#8B7322' },
      purple: { bg: '#E8DDE2', text: '#6E5A65' },
      pink:   { bg: '#F0E0D2', text: '#7A5C44' },
      gray:   { bg: '#E8E2DB', text: '#5C5C57' },
    }
    const LANDING_PRIORITY_DOT = { high: '#C27A4A', medium: '#D4A843', low: '#A8BA32' }

    const AI_CARDS = [
      {
        taskNumber: 42,
        title: 'Checkout redesign',
        description: 'Cart + summary shipped, payment step in progress',
        labels: [{ text: 'Frontend', color: 'blue' }],
        priority: 'high',
        dueDate: 'EOD',
        checklist: { done: 2, total: 3 },
        assignee: 'D',
        icon: 'shopping-cart',
      },
      {
        taskNumber: 43,
        title: 'Auth JWT migration',
        description: 'Refresh rotation working, mobile swap pending',
        labels: [{ text: 'Backend', color: 'green' }],
        priority: 'high',
        dueDate: null,
        checklist: { done: 3, total: 4 },
        assignee: 'J',
        icon: 'shield-check',
      },
      {
        taskNumber: 44,
        title: 'Search performance',
        description: 'P99 800ms \u2192 220ms after index rebuild',
        labels: [{ text: 'Perf', color: 'purple' }],
        priority: 'medium',
        dueDate: null,
        checklist: null,
        assignee: 'A',
        icon: 'gauge',
      },
    ]

    /* ── Timeline constants — shake variant.
       Messages are always visible (no pop, no fade). Each one gets a
       staggered horizontal shake/nudge to draw attention as if it just
       landed. After all 3 have shaken, cards sweep in on the right, then
       a 2-second hold before the loop restarts. Messages never clear. ── */
    const TEAMS_SHAKE_START = 300        // first message shakes 300ms into the loop
    const TEAMS_SHAKE_STAGGER = 550      // gap between each message's shake trigger
    const TEAMS_SHAKE_DUR = 450          // each shake lasts 450ms
    const TEAMS_SHAKE_LAST_END = TEAMS_SHAKE_START + (TEAMS_MESSAGES.length - 1) * TEAMS_SHAKE_STAGGER + TEAMS_SHAKE_DUR
    const TEAMS_CARDS_GAP = 400
    const TEAMS_CARDS_START = TEAMS_SHAKE_LAST_END + TEAMS_CARDS_GAP
    const TEAMS_CARD_SWEEP = 750
    const TEAMS_CARD_STAGGER = 600
    const TEAMS_CARDS_END = TEAMS_CARDS_START + (AI_CARDS.length - 1) * TEAMS_CARD_STAGGER + TEAMS_CARD_SWEEP
    const TEAMS_HOLD_DUR = 2000          // 2-second hold at the end of each cycle
    const TEAMS_TIMELINE_TOTAL = TEAMS_CARDS_END + TEAMS_HOLD_DUR

    /* ── Pure-functional state calculators ── */

    // Messages are always visible — opacity is never touched. Each message
    // gets a staggered horizontal shake: a damped sine oscillation that
    // starts at its stagger time and runs for TEAMS_SHAKE_DUR ms. Returns
    // the translateX offset in pixels.
    function computeTeamsMessageShake(elapsed, msgIdx) {
      const shakeStart = TEAMS_SHAKE_START + msgIdx * TEAMS_SHAKE_STAGGER
      if (elapsed < shakeStart) return 0
      const t = elapsed - shakeStart
      if (t >= TEAMS_SHAKE_DUR) return 0
      const progress = t / TEAMS_SHAKE_DUR
      // Amplitude decays linearly from 4px to 0 across the shake duration.
      // 2 full sine oscillations → right-left-right-left-settle, each smaller.
      const amplitude = 4 * (1 - progress)
      return amplitude * Math.sin(progress * Math.PI * 4)
    }

    function computeTeamsCardsLayerOpacity() {
      return 1
    }

    // Carry-over is anchored to TEAMS_CARDS_START now that there's no
    // MSG_END: previous cycle's cards stay visible through the entire
    // message-shake phase, then clear as the new sweep begins.
    function computeTeamsCardState(elapsed, cardIdx) {
      if (elapsed < TEAMS_CARDS_START) return { opacity: 1, sweepProgress: 1 }
      const cardShowStart = TEAMS_CARDS_START + cardIdx * TEAMS_CARD_STAGGER
      if (elapsed < cardShowStart) return { opacity: 0, sweepProgress: 0 }
      const cardElapsed = elapsed - cardShowStart
      return { opacity: 1, sweepProgress: Math.min(1, cardElapsed / TEAMS_CARD_SWEEP) }
    }

    /* ── Build message rows ── */
    function buildMessageTextFragment(text, mentions) {
      const frag = document.createDocumentFragment()
      if (!mentions || mentions.length === 0) {
        frag.appendChild(document.createTextNode(text))
        return frag
      }
      const escaped = mentions.map((m) => m.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'))
      const regex = new RegExp(`(${escaped.join('|')})`, 'g')
      const parts = text.split(regex)
      for (const part of parts) {
        if (!part) continue
        if (mentions.includes(part)) {
          frag.appendChild(h('span', { class: 'text-[#8BA32E] font-medium' }, part))
        } else {
          frag.appendChild(document.createTextNode(part))
        }
      }
      return frag
    }

    // Teams 2024: consecutive messages from the same sender are grouped —
    // circle avatar, name, and timestamp appear only on the first row.
    // Continuation rows render just the body, pulled close with negative margin.
    function buildMessageRow(msg, isGroupedContinuation) {
      const body = h('p', { class: 'text-[12px] text-[#252423] leading-relaxed break-words' })
      body.appendChild(buildMessageTextFragment(msg.text, msg.mentions))

      if (isGroupedContinuation) {
        const spacer = h('div', { class: 'w-7 shrink-0' })
        return h('div', {
          class: 'flex gap-2.5 -mt-2',
          style: 'transform-origin: left center;',
        }, [
          spacer,
          h('div', { class: 'flex-1 min-w-0' }, body),
        ])
      }

      // Teams avatar = circle with user initial on a colored fill
      const avatar = h('div', {
        class: 'w-7 h-7 rounded-full shrink-0 flex items-center justify-center text-[11px] font-semibold text-white',
        style: `background-color: ${msg.avatarBg};`,
      }, msg.initial)

      const header = h('div', { class: 'flex items-baseline gap-2 mb-0.5' }, [
        h('span', { class: 'text-[13px] font-bold text-[#252423]' }, msg.sender),
        h('span', { class: 'text-[10px] text-[#616061]' }, msg.timestamp),
      ])

      return h('div', {
        class: 'flex gap-2.5',
        style: 'transform-origin: left center;',
      }, [
        avatar,
        h('div', { class: 'flex-1 min-w-0' }, [header, body]),
      ])
    }

    /* ── Build extracted card — identical to the Slack draft ── */
    function buildCardRow(card) {
      const dotColor = LANDING_PRIORITY_DOT[card.priority]

      const phosphorFactory = PHOSPHOR_BY_NAME[card.icon]
      const iconNode = phosphorFactory ? phosphorFactory() : null
      const leadingSlot = h('div', { class: 'flex items-center pl-3 shrink-0' }, [
        h('div', { class: 'w-7 h-7 rounded-lg flex items-center justify-center bg-[#E8E2DB] text-[#8E8E89]' }, iconNode),
      ])

      let labelsRow = null
      if (card.labels && card.labels.length > 0) {
        const labelSpans = card.labels.map((label) => {
          const s = LANDING_LABEL_BG[label.color]
          return h('span', {
            class: 'text-[10px] font-semibold px-2 py-0.5 rounded-full',
            style: `background-color: ${s.bg}; color: ${s.text};`,
          }, label.text)
        })
        labelsRow = h('div', { class: 'flex flex-wrap gap-1.5 mb-2' }, labelSpans)
      }

      const taskMetaRow = h('div', { class: 'flex items-center gap-1.5 mb-0.5' }, [
        checkCircleIcon(),
        h('span', { class: 'text-[11px] font-medium text-[#5C5C57]' }, 'Task #' + card.taskNumber),
        h('span', { class: 'w-2 h-2 rounded-full', style: `background-color: ${dotColor};` }),
      ])

      const titleEl = h('p', { class: 'card-title text-[13px] font-medium leading-snug ai-shimmer-reveal' }, card.title)
      const descEl = card.description
        ? h('p', { class: 'card-desc text-[12px] leading-relaxed mt-1 line-clamp-2 ai-shimmer-reveal' }, card.description)
        : null

      const metaChildren = []
      if (card.dueDate) {
        metaChildren.push(h('span', {
          class: 'text-[10px] font-medium flex items-center gap-1 px-2 py-0.5 rounded-full bg-[#EEF2D6] text-[#A8BA32]',
        }, [calendarIcon(), card.dueDate]))
      }
      if (card.checklist) {
        metaChildren.push(h('span', {
          class: 'text-[10px] font-medium flex items-center gap-1 px-2 py-0.5 rounded-full bg-[#E8E2DB] text-[#8E8E89]',
        }, [checkSquareIcon(), `${card.checklist.done}/${card.checklist.total}`]))
      }
      if (card.description) {
        metaChildren.push(h('span', { class: 'text-[10px] flex items-center text-[#8E8E89]' }, alignLeftIcon()))
      }

      const assigneeEl = card.assignee
        ? h('span', {
            class: 'w-6 h-6 rounded-full shrink-0 flex items-center justify-center text-[10px] font-bold text-white bg-[#1B1B18]',
          }, card.assignee)
        : null

      const bottomRow = h('div', { class: 'flex items-center justify-between gap-2 mt-2.5' }, [
        h('div', { class: 'flex flex-wrap items-center gap-1.5 min-w-0' }, metaChildren),
        assigneeEl,
      ])

      const bodyChildren = [labelsRow, taskMetaRow, titleEl, descEl, bottomRow].filter(Boolean)
      const body = h('div', { class: 'flex-1 min-w-0 pl-2.5 pr-3.5 py-3' }, bodyChildren)

      return h('div', {
        class: 'relative overflow-hidden w-full rounded-xl border shadow-sm flex bg-white border-[#E0DBD5]',
      }, [leadingSlot, body])
    }

    /* ── Mount ── */
    const messagesRoot = document.getElementById('teams-messages')
    const messageEls = TEAMS_MESSAGES.map((msg, idx) => {
      const isGroupedContinuation = idx > 0 && TEAMS_MESSAGES[idx - 1].sender === msg.sender
      const el = buildMessageRow(msg, isGroupedContinuation)
      messagesRoot.appendChild(el)
      return el
    })

    const cardsRoot = document.getElementById('teams-cards')
    const cardEls = AI_CARDS.map((card) => {
      const el = buildCardRow(card)
      cardsRoot.appendChild(el)
      return el
    })

    const cardsLayer = document.getElementById('teams-cards-layer')

    /* ── Animation loop ── */
    let elapsed = 0
    const TICK = 50
    setInterval(() => {
      elapsed = (elapsed + TICK >= TEAMS_TIMELINE_TOTAL) ? 0 : elapsed + TICK

      for (let i = 0; i < messageEls.length; i++) {
        const shakeX = computeTeamsMessageShake(elapsed, i)
        messageEls[i].style.transform = `translateX(${shakeX}px)`
      }

      cardsLayer.style.opacity = computeTeamsCardsLayerOpacity(elapsed)

      for (let i = 0; i < cardEls.length; i++) {
        const s = computeTeamsCardState(elapsed, i)
        const el = cardEls[i]
        el.style.opacity = s.opacity
        const revealPct = (s.sweepProgress * 124 - 12) + '%'
        const shimmerNodes = el.querySelectorAll('.ai-shimmer-reveal')
        for (const n of shimmerNodes) n.style.setProperty('--reveal', revealPct)
      }
    }, TICK)
  </script>
</body>
</html>
