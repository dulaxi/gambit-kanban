<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo Panel — Kolumn Sandbox</title>

  <!-- Fonts (same sources the site uses) -->
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
  <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Mona+Sans:wght@200..900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200..800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://api.fontshare.com/v2/css?f[]=sentient@200,300,400,500,700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@fontsource/google-sans@5.2.1/latin-400.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@fontsource/google-sans@5.2.1/latin-500.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@fontsource/google-sans@5.2.1/latin-700.css" rel="stylesheet" />

  <!-- Tailwind v4 (same version family as the site) via browser CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Phosphor Icons (regular weight) — same source the main app uses -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />

  <!-- Phosphor palette + font tokens — mirrors src/index.css -->
  <style type="text/tailwindcss">
    @theme {
      --font-sans: 'Mona Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --font-heading: 'Sentient', Georgia, serif;
      --font-mono: 'IBM Plex Mono', 'SF Mono', SFMono-Regular, Menlo, monospace;
      --font-logo: 'Google Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;

      /* Phosphor palette */
      --color-cream-light: #FAF8F6;
      --color-cream: #F2EDE8;
      --color-cream-dark: #E8E2DB;
      --color-sand: #E0DBD5;
      --color-ink: #1B1B18;
      --color-charcoal: #5C5C57;
      --color-stone: #8E8E89;
      --color-mist: #C4BFB8;
      --color-lime: #C2D64A;
      --color-lime-dark: #A8BA32;
      --color-lime-wash: #EEF2D6;
      --color-copper: #C27A4A;
      --color-copper-wash: #F2D9C7;
      --color-honey: #D4A843;
      --color-honey-wash: #F5EDCF;
      --color-walnut: #8B7355;
      --color-bark: #7A5C44;
      --color-bark-wash: #F0E0D2;
      --color-olive: #A8BA32;
      --color-mauve: #A8969E;
      --color-mauve-wash: #E8DDE2;
    }
  </style>

  <style>
    html, body { background: #FAF8F6; }
    body { font-family: 'Plus Jakarta Sans', -apple-system, sans-serif; margin: 0; }
    @keyframes blink { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }

    /* AI shimmer reveal — text is hidden where the rainbow hasn't passed yet.
       The rainbow band is the "leading edge" of the reveal. Driven by --reveal CSS var. */
    .ai-shimmer-reveal {
      background: linear-gradient(90deg,
        #1B1B18 calc(var(--reveal, 0%) - 12%),
        #C2D64A calc(var(--reveal, 0%) - 4%),
        #D4A843 calc(var(--reveal, 0%) - 1%),
        #C27A4A calc(var(--reveal, 0%) + 1%),
        #A8969E calc(var(--reveal, 0%) + 4%),
        transparent calc(var(--reveal, 0%) + 12%)
      );
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }
  </style>

  <!-- React 18 UMD + Babel standalone (for JSX in the browser) -->
  <!-- React 19 dropped UMD builds from npm; React 18 has the same hooks API we need -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root" class="min-h-screen flex items-center justify-center p-10"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React

    function BrowserChrome() {
      return (
        <div className="flex items-center gap-1.5 px-3 py-2.5 shrink-0">
          <span className="w-2.5 h-2.5 rounded-full bg-[#FF5F57]" />
          <span className="w-2.5 h-2.5 rounded-full bg-[#FEBC2E]" />
          <span className="w-2.5 h-2.5 rounded-full bg-[#28C840]" />
        </div>
      )
    }

    function CreamWindow({ className = '', children }) {
      return (
        <div
          className={`flex-1 rounded-lg overflow-hidden flex flex-col ${className}`}
          style={{
            backgroundColor: '#FAF8F6', // cream-light
            border: '1px solid #E0DBD5',
            boxShadow: '0 8px 24px -8px rgba(27, 27, 24, 0.10)',
          }}
        >
          <BrowserChrome />
          <div className="flex-1 overflow-hidden relative">
            {children}
          </div>
        </div>
      )
    }

    /* ── Draft notes typing animation (left window) ── */
    const DRAFT_TITLE = 'launch landing page'        // static, always shown
    const DRAFT_STATIC_LINE = 'for next week'        // static, always shown
    const DRAFT_LINES = [                             // animated, type one at a time
      'redo hero',
      '3 pricing tiers $9 $29 $99',
      'stripe integration b4 fri',
    ]
    const CHAR_DURATION = 45    // ms per character
    const LINE_PAUSE = 380      // pause between lines
    const ANIM_START = 600      // delay before first animated line starts typing

    // Compute when each animated line starts typing (cumulative)
    function computeLineStarts() {
      const starts = []
      let cursor = ANIM_START
      for (const line of DRAFT_LINES) {
        starts.push(cursor)
        cursor += line.length * CHAR_DURATION + LINE_PAUSE
      }
      // Typing fully ends when the last line finishes its characters (no trailing pause)
      const lastLine = DRAFT_LINES[DRAFT_LINES.length - 1]
      const typingEnd = starts[starts.length - 1] + lastLine.length * CHAR_DURATION
      return { starts, typingEnd }
    }
    const { starts: LINE_STARTS, typingEnd: LEFT_TYPING_END } = computeLineStarts()

    function BlinkingCursor() {
      return (
        <span
          className="inline-block align-middle ml-[1px]"
          style={{
            width: '2px',
            height: '1.1em',
            backgroundColor: '#A8BA32', // lime-dark
            animation: 'blink 1s steps(2) infinite',
          }}
        />
      )
    }

    function DraftNotes({ elapsed }) {
      // Helper: how much of a string has been "typed" by now
      const typed = (text, startTime) => {
        if (elapsed < startTime) return ''
        const chars = Math.floor((elapsed - startTime) / CHAR_DURATION)
        return text.slice(0, Math.min(chars, text.length))
      }

      const linesTyped = DRAFT_LINES.map((line, i) => typed(line, LINE_STARTS[i]))

      // Cursor lives at the end of the most recently typed animated line — but
      // hide it once typing is fully done (so attention shifts to the right side).
      let cursorLineIdx = -1
      const typingDone = elapsed >= LEFT_TYPING_END
      if (!typingDone) {
        for (let i = 0; i < linesTyped.length; i++) {
          if (linesTyped[i].length > 0) cursorLineIdx = i
        }
      }

      return (
        <div className="px-6 sm:px-8 pt-5 sm:pt-6 flex flex-col gap-3 select-none">
          {/* Title — always shown, no animation */}
          <h3
            className="text-lg sm:text-xl text-[#1B1B18] tracking-tight leading-tight"
            style={{ fontFamily: 'Sentient, Georgia, serif', fontWeight: 400 }}
          >
            {DRAFT_TITLE}
          </h3>

          <div className="flex flex-col gap-1.5 text-xs sm:text-sm text-[#5C5C57] font-sans">
            {/* Static first line — always shown, no animation */}
            <p className="leading-snug">{DRAFT_STATIC_LINE}</p>

            {/* Animated lines */}
            {linesTyped.map((text, i) => {
              if (!text) return null
              return (
                <p key={i} className="leading-snug">
                  {text}
                  {cursorLineIdx === i && <BlinkingCursor />}
                </p>
              )
            })}
          </div>
        </div>
      )
    }

    /* Mirror of DraftNotes — renders the full text with per-line opacities for fade-out */
    function MirrorNotes({ lineOpacities }) {
      return (
        <div className="px-6 sm:px-8 pt-5 sm:pt-6 flex flex-col gap-3 select-none">
          <h3
            className="text-lg sm:text-xl text-[#1B1B18] tracking-tight leading-tight"
            style={{ fontFamily: 'Sentient, Georgia, serif', fontWeight: 400, opacity: lineOpacities[0] }}
          >
            {DRAFT_TITLE}
          </h3>
          <div className="flex flex-col gap-1.5 text-xs sm:text-sm text-[#5C5C57] font-sans">
            <p className="leading-snug" style={{ opacity: lineOpacities[1] }}>{DRAFT_STATIC_LINE}</p>
            {DRAFT_LINES.map((line, i) => (
              <p key={i} className="leading-snug" style={{ opacity: lineOpacities[2 + i] }}>{line}</p>
            ))}
          </div>
        </div>
      )
    }

    /* ── Inline icon components (lucide-style strokes) ── */
    const Icon = ({ d, paths, className = 'w-4 h-4', size = 24 }) => (
      <svg className={className} viewBox={`0 0 ${size} ${size}`} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
        {paths || <path d={d} />}
      </svg>
    )
    const IconFile = (props) => (
      <Icon {...props} paths={<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" /></>} />
    )
    const IconCheckCircle = (props) => (
      <Icon {...props} paths={<><circle cx="12" cy="12" r="10" /></>} />
    )
    const IconCalendar = (props) => (
      <Icon {...props} paths={<><rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></>} />
    )
    const IconCheckSquare = (props) => (
      <Icon {...props} paths={<><polyline points="9 11 12 14 22 4" /><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" /></>} />
    )
    const IconAlignLeft = (props) => (
      <Icon {...props} paths={<><line x1="17" y1="10" x2="3" y2="10" /><line x1="21" y1="6" x2="3" y2="6" /><line x1="21" y1="14" x2="3" y2="14" /><line x1="17" y1="18" x2="3" y2="18" /></>} />
    )

    /* ── AI-generated card data — polished versions of the draft notes ── */
    // Real LABEL_BG colors from src/utils/formatting.js (Phosphor palette, muted/warm)
    const LABEL_BG = {
      red:    { bg: '#F2D9C7', text: '#8B5A33' },
      blue:   { bg: '#DAE0F0', text: '#4A5578' },
      green:  { bg: '#EEF2D6', text: '#6B7A12' },
      yellow: { bg: '#F5EDCF', text: '#8B7322' },
      purple: { bg: '#E8DDE2', text: '#6E5A65' },
      pink:   { bg: '#F0E0D2', text: '#7A5C44' },
      gray:   { bg: '#E8E2DB', text: '#5C5C57' },
    }
    const PRIORITY_DOT = {
      high:   '#C27A4A', // copper
      medium: '#D4A843', // honey
      low:    '#A8BA32', // lime-dark
    }

    const AI_CARDS = [
      {
        taskNumber: 24,
        title: 'Redo hero section',
        description: 'Sarah feedback — current hero feels too plain',
        labels: [{ text: 'Frontend', color: 'blue' }],
        priority: 'high',
        dueDate: null,
        checklist: null,
        assignee: 'A',
        icon: 'browser', // hero/landing page → browser window
      },
      {
        taskNumber: 25,
        title: 'Build pricing page',
        description: 'Three-tier plan with monthly/annual toggle',
        labels: [{ text: 'Frontend', color: 'blue' }],
        priority: 'medium',
        dueDate: null,
        checklist: { done: 0, total: 3 },
        assignee: null,
        icon: 'tag', // pricing → price tag
      },
      {
        taskNumber: 26,
        title: 'Stripe integration',
        description: 'Checkout, webhooks, customer portal',
        labels: [{ text: 'Backend', color: 'green' }],
        priority: 'high',
        dueDate: 'Fri',
        checklist: null,
        assignee: 'M',
        icon: 'credit-card', // payments → credit card
      },
    ]

    /* ── Master timeline ──
       Phase 1: Left types. Right shows cards (persistent end state from previous loop).
       Phase 2: Left finishes. Mirror text fades in on right (overlaying cards).
       Phase 3: Mirror text holds visible.
       Phase 4: Mirror text lines fade away bottom-to-top.
       Phase 5: Cards reveal top-to-bottom, one at a time, with gradient sweep.
       Phase 6: Hold complete state, then loop. Cards persist into next loop's Phase 1. */

    const TOTAL_MIRROR_LINES = 2 + DRAFT_LINES.length // title + static + 3 lines = 5

    // Phase 2 — Mirror text fades in
    const MIRROR_GAP = 150
    const MIRROR_START = LEFT_TYPING_END + MIRROR_GAP
    const MIRROR_FADE_IN_DUR = 250
    const MIRROR_FULL = MIRROR_START + MIRROR_FADE_IN_DUR

    // Phase 3 — Mirror holds (halved from 1200 → 600)
    const MIRROR_HOLD_DUR = 600
    const MIRROR_FADE_LINES_START = MIRROR_FULL + MIRROR_HOLD_DUR

    // Phase 4 — Lines fade bottom to top (quicker)
    const MIRROR_LINE_FADE_DUR = 180
    const MIRROR_LINE_STAGGER = 90
    const MIRROR_FADE_LINES_END = MIRROR_FADE_LINES_START + (TOTAL_MIRROR_LINES - 1) * MIRROR_LINE_STAGGER + MIRROR_LINE_FADE_DUR

    // Phase 5 — Cards reveal top to bottom
    const CARDS_GAP = 250
    const CARDS_START = MIRROR_FADE_LINES_END + CARDS_GAP
    const CARD_SWEEP = 750
    const CARD_STAGGER = 600
    const CARDS_END = CARDS_START + (AI_CARDS.length - 1) * CARD_STAGGER + CARD_SWEEP

    // Phase 6 — Hold final state
    const FINAL_HOLD = 2200
    const TIMELINE_TOTAL = CARDS_END + FINAL_HOLD

    /* ── Opacity / progress helpers (pure functions of elapsed) ── */

    // Mirror LAYER visibility — fades in at MIRROR_START, stays visible through line-fade phase
    function computeMirrorLayerOpacity(elapsed) {
      if (elapsed < MIRROR_START) return 0
      if (elapsed < MIRROR_FULL) return (elapsed - MIRROR_START) / MIRROR_FADE_IN_DUR
      if (elapsed < MIRROR_FADE_LINES_END) return 1
      return 0
    }

    // Per-line opacity during the bottom-to-top line fade
    // lineIdx 0 = title (top), lineIdx (TOTAL-1) = bottom-most line
    function computeMirrorLineOpacity(elapsed, lineIdx) {
      if (elapsed < MIRROR_FADE_LINES_START) return 1
      // Bottom fades first → highest lineIdx starts first
      const fadeOrderIdx = (TOTAL_MIRROR_LINES - 1) - lineIdx
      const lineFadeStart = MIRROR_FADE_LINES_START + fadeOrderIdx * MIRROR_LINE_STAGGER
      if (elapsed < lineFadeStart) return 1
      return Math.max(0, 1 - (elapsed - lineFadeStart) / MIRROR_LINE_FADE_DUR)
    }

    // Cards LAYER visibility — visible during persistent state and during reveal phase
    function computeCardsLayerOpacity(elapsed) {
      if (elapsed < MIRROR_START) return 1   // persistent end state
      if (elapsed < CARDS_START) return 0    // hidden during mirror phases
      return 1                                 // visible during reveal + final hold
    }

    // Per-card state — opacity & sweep progress
    function computeCardState(elapsed, cardIdx) {
      const cardShowStart = CARDS_START + cardIdx * CARD_STAGGER

      if (elapsed < MIRROR_START) {
        // Persistent end state — fully shown, no animation
        return { opacity: 1, sweepProgress: 1 }
      }
      if (elapsed < cardShowStart) {
        // Hidden during mirror and waiting for its reveal slot
        return { opacity: 0, sweepProgress: 0 }
      }
      // Revealing — instant opacity, sweep handles the visual effect
      const cardElapsed = elapsed - cardShowStart
      return { opacity: 1, sweepProgress: Math.min(1, cardElapsed / CARD_SWEEP) }
    }

    /* Faithful replica of src/components/board/Card.jsx */
    function AICard({ card, opacity, sweepProgress }) {
      const dotColor = PRIORITY_DOT[card.priority]
      const labelStyles = card.labels.map((l) => LABEL_BG[l.color])

      // Reveal value for the shimmer-reveal gradient — sweeps from -12% (all hidden)
      // to 112% (all revealed) so the rainbow band travels through the text element
      const revealVar = `${sweepProgress * 124 - 12}%`

      return (
        <div
          className="relative overflow-hidden w-full rounded-xl border shadow-sm flex"
          style={{
            backgroundColor: '#FFFFFF',
            borderColor: '#E0DBD5',
            opacity,
          }}
        >
          {/* Icon — left center (Phosphor regular) */}
          <div className="flex items-center pl-3 shrink-0">
            <div className="w-7 h-7 rounded-lg flex items-center justify-center" style={{ backgroundColor: '#E8E2DB', color: '#8E8E89' }}>
              <i className={`ph ph-${card.icon}`} style={{ fontSize: '16px' }} />
            </div>
          </div>

          {/* Content */}
          <div className="flex-1 min-w-0 pl-2.5 pr-3.5 py-3">
            {/* Labels row */}
            {card.labels.length > 0 && (
              <div className="flex flex-wrap gap-1.5 mb-2">
                {card.labels.map((label, idx) => (
                  <span
                    key={label.text}
                    className="text-[10px] font-semibold px-2 py-0.5 rounded-full"
                    style={{
                      backgroundColor: labelStyles[idx].bg,
                      color: labelStyles[idx].text,
                    }}
                  >
                    {label.text}
                  </span>
                ))}
              </div>
            )}

            {/* Task # row */}
            <div className="flex items-center gap-1.5 mb-0.5">
              <IconCheckCircle className="w-4 h-4 shrink-0" style={{ color: '#8E8E89' }} />
              <span className="text-[11px] font-medium" style={{ color: '#5C5C57' }}>Task #{card.taskNumber}</span>
              <span className="w-2 h-2 rounded-full" style={{ backgroundColor: dotColor }} />
            </div>

            {/* Title — shimmer-reveal: rainbow leading edge sweeps left→right, revealing text */}
            <p
              className="text-[13px] font-medium leading-snug ai-shimmer-reveal"
              style={{ '--reveal': revealVar }}
            >
              {card.title}
            </p>

            {/* Description preview — same shimmer reveal */}
            {card.description && (
              <p
                className="text-[12px] leading-relaxed mt-1 line-clamp-2 ai-shimmer-reveal"
                style={{ '--reveal': revealVar }}
              >
                {card.description}
              </p>
            )}

            {/* Bottom row */}
            <div className="flex items-center justify-between gap-2 mt-2.5">
              <div className="flex flex-wrap items-center gap-1.5 min-w-0">
                {card.dueDate && (
                  <span className="text-[10px] font-medium flex items-center gap-1 px-2 py-0.5 rounded-full" style={{ backgroundColor: '#EEF2D6', color: '#A8BA32' }}>
                    <IconCalendar className="w-3 h-3" />
                    {card.dueDate}
                  </span>
                )}
                {card.checklist && (
                  <span className="text-[10px] font-medium flex items-center gap-1 px-2 py-0.5 rounded-full" style={{ backgroundColor: '#E8E2DB', color: '#8E8E89' }}>
                    <IconCheckSquare className="w-3 h-3" />
                    {card.checklist.done}/{card.checklist.total}
                  </span>
                )}
                {card.description && (
                  <span className="text-[10px] flex items-center" style={{ color: '#8E8E89' }}>
                    <IconAlignLeft className="w-3 h-3" />
                  </span>
                )}
              </div>

              {/* Assignee avatar */}
              {card.assignee && (
                <span
                  className="w-6 h-6 rounded-full shrink-0 flex items-center justify-center text-[10px] font-bold text-white"
                  style={{ backgroundColor: '#1B1B18' }}
                >
                  {card.assignee}
                </span>
              )}
            </div>
          </div>

        </div>
      )
    }

    /* Cards column — receives per-card opacity & sweep state from parent */
    function AIGeneratedCards({ cardStates }) {
      return (
        <div className="pt-5 px-4 flex justify-center select-none">
          <div className="flex flex-col w-full max-w-[290px]">
            {/* Column header */}
            <div className="flex items-baseline gap-2 px-0.5 pb-3">
              <h3 className="text-sm font-semibold" style={{ color: '#1B1B18' }}>to do</h3>
              <span className="text-xs" style={{ color: '#8E8E89' }}>{AI_CARDS.length}</span>
            </div>
            {/* Cards stack */}
            <div className="flex flex-col gap-2">
              {AI_CARDS.map((card, idx) => (
                <AICard
                  key={card.taskNumber}
                  card={card}
                  opacity={cardStates[idx].opacity}
                  sweepProgress={cardStates[idx].sweepProgress}
                />
              ))}
            </div>
          </div>
        </div>
      )
    }

    /* Right window content — layers mirror text + cards. Computes all derived state. */
    function RightContent({ elapsed }) {
      // Mirror layer state
      const mirrorLayerOpacity = computeMirrorLayerOpacity(elapsed)
      const lineOpacities = Array.from({ length: TOTAL_MIRROR_LINES }, (_, idx) =>
        computeMirrorLineOpacity(elapsed, idx)
      )

      // Cards layer state
      const cardsLayerOpacity = computeCardsLayerOpacity(elapsed)
      const cardStates = AI_CARDS.map((_, idx) => computeCardState(elapsed, idx))

      return (
        <>
          {/* Layer 1: cards — persistent default state, hidden during mirror, revealed top→bottom */}
          <div className="absolute inset-0 pointer-events-none" style={{ opacity: cardsLayerOpacity }}>
            <AIGeneratedCards cardStates={cardStates} />
          </div>
          {/* Layer 2: mirror text — appears after left finishes, fades line-by-line bottom→top */}
          <div className="absolute inset-0 pointer-events-none" style={{ opacity: mirrorLayerOpacity }}>
            <MirrorNotes lineOpacities={lineOpacities} />
          </div>
        </>
      )
    }

    function App() {
      // Master clock — drives both windows in sequence
      const [elapsed, setElapsed] = useState(0)

      useEffect(() => {
        const id = setInterval(() => {
          setElapsed((prev) => (prev + 50 >= TIMELINE_TOTAL ? 0 : prev + 50))
        }, 50)
        return () => clearInterval(id)
      }, [])

      return (
        <div className="w-full max-w-5xl">
          {/* Mauve backdrop container — auto-grows to fit windows */}
          <div
            className="relative overflow-hidden w-full rounded-2xl"
            style={{
              backgroundColor: '#E8DDE2', // mauve-wash
              boxShadow: 'inset 0 0 0 1px #E0DBD5',
            }}
          >
            {/* Two cream windows — stacked on mobile, side-by-side from md up */}
            <div className="flex flex-col md:flex-row md:items-center gap-4 md:gap-6 p-4 md:p-8">
              <CreamWindow className="aspect-[4/3] md:aspect-[4/4.5]">
                <DraftNotes elapsed={elapsed} />
              </CreamWindow>
              <CreamWindow className="aspect-[4/5]">
                <RightContent elapsed={elapsed} />
              </CreamWindow>
            </div>
          </div>
        </div>
      )
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />)
  </script>
</body>
</html>
