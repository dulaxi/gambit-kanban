<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #FAF8F6;
      color: #1B1B18;
      min-height: 100vh;
      font-family: 'General Sans', -apple-system, sans-serif;
    }
    body { padding: 56px 32px 96px; }

    .header { max-width: 1200px; margin: 0 auto 48px; text-align: center; }
    .header .eyebrow {
      font-size: 12px; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; color: #8E8E89; margin-bottom: 12px;
    }
    .header h1 {
      font-size: 28px; font-weight: 500; color: #1B1B18;
      letter-spacing: -0.02em; margin-bottom: 8px;
    }
    .header p { font-size: 14px; color: #5C5C57; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: #FFFFFF;
      border: 1px solid #E0DBD5;
      border-radius: 20px;
      padding: 28px 24px 20px;
      display: flex;
      flex-direction: column;
      transition: border-color 0.15s ease, transform 0.15s ease;
    }
    .card:hover {
      border-color: #C2D64A;
      transform: translateY(-1px);
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      min-height: 34px;
    }
    .logo-symbol {
      width: 30px;
      height: 30px;
      color: #8BA32E;
      flex-shrink: 0;
    }
    .logo-text {
      font-size: 23px;
      line-height: 1;
      color: #1B1B18;
      letter-spacing: -0.01em;
    }

    .meta {
      width: 100%;
      padding-top: 14px;
      border-top: 1px dashed #E8E2DB;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .font-name {
      font-family: 'General Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: #5C5C57;
    }
    .weight-tag {
      font-family: 'General Sans', sans-serif;
      font-size: 10px;
      font-weight: 500;
      color: #8E8E89;
      padding: 2px 8px;
      background: #F2EDE8;
      border-radius: 999px;
    }

    .f1  { font-family: 'Satoshi', sans-serif; font-weight: 500; }
    .f2  { font-family: 'General Sans', sans-serif; font-weight: 500; }
    .f3  { font-family: 'Clash Display', sans-serif; font-weight: 500; }
    .f4  { font-family: 'Clash Grotesk', sans-serif; font-weight: 500; }
    .f5  { font-family: 'Cabinet Grotesk', sans-serif; font-weight: 500; }
    .f6  { font-family: 'Switzer', sans-serif; font-weight: 500; }
    .f7  { font-family: 'Supreme', sans-serif; font-weight: 500; }
    .f8  { font-family: 'Nippo', sans-serif; font-weight: 500; letter-spacing: -0.02em; }
    .f9  { font-family: 'Tanker', sans-serif; font-weight: 400; }
    .f10 { font-family: 'Author', serif; font-weight: 500; }
    .f11 { font-family: 'Erode', serif; font-weight: 500; }
    .f12 { font-family: 'Sentient', serif; font-weight: 400; font-style: italic; }
    .f13 { font-family: 'Gambarino', serif; font-weight: 400; }
    .f14 { font-family: 'Gambetta', serif; font-weight: 500; }
    .f15 { font-family: 'Boska', serif; font-weight: 500; }
    .f16 { font-family: 'Bespoke Serif', serif; font-weight: 500; }
    .f17 { font-family: 'Bespoke Slab', serif; font-weight: 500; }
    .f18 { font-family: 'Bespoke Stencil', serif; font-weight: 400; }
    .f19 { font-family: 'Panchang', sans-serif; font-weight: 500; }
    .f20 { font-family: 'Ranade', sans-serif; font-weight: 500; }
    .f21 { font-family: 'Zodiak', serif; font-weight: 400; }
    .f22 { font-family: 'Excon', serif; font-weight: 500; }
    .f23 { font-family: 'Chillax', sans-serif; font-weight: 500; }
    .f24 { font-family: 'Array', sans-serif; font-weight: 400; }
    .f25 { font-family: 'Stardom', serif; font-weight: 400; }
    .f26 { font-family: 'Quincy CF', serif; font-weight: 500; }
    .f27 { font-family: 'Synonym', sans-serif; font-weight: 500; }
    .f28 { font-family: 'Pilcrow', sans-serif; font-weight: 500; }
    .f29 { font-family: 'Bonny', sans-serif; font-weight: 400; }
    .f30 { font-family: 'Pally', sans-serif; font-weight: 500; }
    .f31 { font-family: 'Rosaline', serif; font-weight: 400; }
    .f32 { font-family: 'Amulya', sans-serif; font-weight: 500; }
    .f33 { font-family: 'Khand', sans-serif; font-weight: 500; }
    .f34 { font-family: 'Gunterz', serif; font-weight: 500; }
    .f35 { font-family: 'Melodrama', serif; font-weight: 400; font-style: italic; }
    .f36 { font-family: 'Alpino', sans-serif; font-weight: 500; }
    .f37 { font-family: 'Britney', serif; font-weight: 400; }
    .f38 { font-family: 'Sharpie', sans-serif; font-weight: 400; }
    .f39 { font-family: 'Canela', serif; font-weight: 500; }
    .f40 { font-family: 'Familjen Grotesk', sans-serif; font-weight: 500; }
    .f41 { font-family: 'Nohemi', sans-serif; font-weight: 500; }
    .f42 { font-family: 'Azeret Mono', monospace; font-weight: 500; }
    .f43 { font-family: 'JetBrains Mono', monospace; font-weight: 500; }
    .f44 { font-family: 'PP Neue Machina', sans-serif; font-weight: 500; }
  </style>
</head>
<body>

  <header class="header">
    <div class="eyebrow">Brand</div>
    <h1>All Fontshare fonts</h1>
    <p>Kolumn wordmark with every Fontshare font. Hover to highlight.</p>
  </header>

  <div class="grid" id="grid"></div>

  <script>
    const SVG_NS = 'http://www.w3.org/2000/svg'

    function buildKanbanSvg() {
      const svg = document.createElementNS(SVG_NS, 'svg')
      svg.setAttribute('class', 'logo-symbol')
      svg.setAttribute('viewBox', '0 0 256 256')
      svg.setAttribute('fill', 'currentColor')
      const path = document.createElementNS(SVG_NS, 'path')
      path.setAttribute('d', 'M160,56v96a8,8,0,0,1-8,8H112a8,8,0,0,1-8-8V56a8,8,0,0,1,8-8h40A8,8,0,0,1,160,56Zm64-8H184a8,8,0,0,0-8,8v52a4,4,0,0,0,4,4h48a4,4,0,0,0,4-4V56A8,8,0,0,0,224,48Zm4,80H180a4,4,0,0,0-4,4v44a16,16,0,0,0,16,16h24a16,16,0,0,0,16-16V132A4,4,0,0,0,228,128ZM80,48H40a8,8,0,0,0-8,8v52a4,4,0,0,0,4,4H84a4,4,0,0,0,4-4V56A8,8,0,0,0,80,48Zm4,80H36a4,4,0,0,0-4,4v76a16,16,0,0,0,16,16H72a16,16,0,0,0,16-16V132A4,4,0,0,0,84,128Z')
      svg.appendChild(path)
      return svg
    }

    const FONTS = [
      ['f1',  'Satoshi',          '500'],
      ['f2',  'General Sans',     '500'],
      ['f3',  'Clash Display',    '500'],
      ['f4',  'Clash Grotesk',    '500'],
      ['f5',  'Cabinet Grotesk',  '500'],
      ['f6',  'Switzer',          '500'],
      ['f7',  'Supreme',          '500'],
      ['f8',  'Nippo',            '500'],
      ['f9',  'Tanker',           '400'],
      ['f10', 'Author',           '500'],
      ['f11', 'Erode',            '500'],
      ['f12', 'Sentient Italic',  '400'],
      ['f13', 'Gambarino',        '400'],
      ['f14', 'Gambetta',         '500'],
      ['f15', 'Boska',            '500'],
      ['f16', 'Bespoke Serif',    '500'],
      ['f17', 'Bespoke Slab',     '500'],
      ['f18', 'Bespoke Stencil',  '400'],
      ['f19', 'Panchang',         '500'],
      ['f20', 'Ranade',           '500'],
      ['f21', 'Zodiak',           '400'],
      ['f22', 'Excon',            '500'],
      ['f23', 'Chillax',          '500'],
      ['f24', 'Array',            '400'],
      ['f25', 'Stardom',          '400'],
      ['f26', 'Quincy CF',        '500'],
      ['f27', 'Synonym',          '500'],
      ['f28', 'Pilcrow',          '500'],
      ['f29', 'Bonny',            '400'],
      ['f30', 'Pally',            '500'],
      ['f31', 'Rosaline',         '400'],
      ['f32', 'Amulya',           '500'],
      ['f33', 'Khand',            '500'],
      ['f34', 'Gunterz',          '500'],
      ['f35', 'Melodrama Italic', '400'],
      ['f36', 'Alpino',           '500'],
      ['f37', 'Britney',          '400'],
      ['f38', 'Sharpie',          '400'],
      ['f39', 'Canela',           '500'],
      ['f40', 'Familjen Grotesk', '500'],
      ['f41', 'Nohemi',           '500'],
      ['f42', 'Azeret Mono',      '500'],
      ['f43', 'JetBrains Mono',   '500'],
      ['f44', 'PP Neue Machina',  '500'],
    ]

    function buildCard(cls, name, weight) {
      const card = document.createElement('div')
      card.className = 'card'

      const logoRow = document.createElement('div')
      logoRow.className = 'logo-row'
      logoRow.appendChild(buildKanbanSvg())

      const logoText = document.createElement('span')
      logoText.className = `logo-text ${cls}`
      logoText.textContent = 'Kolumn'
      logoRow.appendChild(logoText)

      const meta = document.createElement('div')
      meta.className = 'meta'

      const fontName = document.createElement('span')
      fontName.className = 'font-name'
      fontName.textContent = name
      meta.appendChild(fontName)

      const weightTag = document.createElement('span')
      weightTag.className = 'weight-tag'
      weightTag.textContent = weight
      meta.appendChild(weightTag)

      card.appendChild(logoRow)
      card.appendChild(meta)
      return card
    }

    const grid = document.getElementById('grid')
    for (const [cls, name, weight] of FONTS) {
      grid.appendChild(buildCard(cls, name, weight))
    }
  </script>
</body>
</html>
