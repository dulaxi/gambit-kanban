    /* ============================================================
       Slack Thread Demo — vanilla JS port of SlackThreadDemo()

       computeSlackCardState functions, and the data arrays are
       mirrored 1:1 so visuals match the landing page.

       DOM is built with createElement + textContent. SVG decoration
       is parsed once via DOMParser and cloned per instance so we
       never assign to innerHTML at runtime.
       ============================================================ */

    const SVG_NS = 'http://www.w3.org/2000/svg'

    /* ── Tiny createElement helper. Attributes are set via setAttribute,
       children are appended; strings become text nodes. No innerHTML. ── */
    function h(tag, attrs, children) {
      const el = document.createElement(tag)
      if (attrs) {
        for (const key in attrs) {
          const val = attrs[key]
          if (val === null || val === undefined || val === false) continue
          if (key === 'class') el.className = val
          else if (key === 'style') el.setAttribute('style', val)
          else el.setAttribute(key, val)
        }
      }
      if (children != null) {
        const list = Array.isArray(children) ? children : [children]
        for (const child of list) {
          if (child == null || child === false) continue
          if (typeof child === 'string') el.appendChild(document.createTextNode(child))
          else el.appendChild(child)
        }
      }
      return el
    }

    /* ── Parse a trusted SVG string once; return a clone each call.
       Safer than innerHTML because the source is a literal in this file
       and DOMParser with image/svg+xml won't execute scripts. ── */
    const svgParser = new DOMParser()
    function svgTemplate(svgString) {
      const doc = svgParser.parseFromString(svgString, 'image/svg+xml')
      const node = doc.documentElement
      return () => node.cloneNode(true)
    }

    const SLACK_FINAL_HOLD = SLACK_HOLD_DUR + SLACK_MSG_FADE_OUT_DUR
    const SLACK_TIMELINE_TOTAL = SLACK_CARDS_END + SLACK_FINAL_HOLD

    /* ── Pure-functional state calculators (mirror React source) ── */
    // Ease-out-back — overshoots 1.0 slightly then settles. Gives the
    // "pop" feel of a chat bubble landing in a Slack thread.
    function easeOutBack(t) {
      const c1 = 1.70158
      const c3 = c1 + 1
      return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2)
    }

    function computeSlackMessageState(elapsed, msgIdx) {
      const starts = [SLACK_MSG_1_START, SLACK_MSG_2_START, SLACK_MSG_3_START]
      const msgStart = starts[msgIdx]
      if (elapsed >= SLACK_MSG_FADE_OUT_START) {
        const fadeElapsed = elapsed - SLACK_MSG_FADE_OUT_START
        const t = Math.min(1, fadeElapsed / SLACK_MSG_FADE_OUT_DUR)
        return { opacity: 1 - t, scale: 1 }
      }
      if (elapsed < msgStart) return { opacity: 0, scale: 0.75 }
      const msgElapsed = elapsed - msgStart
      if (msgElapsed < SLACK_MSG_LAND_DUR) {
        const linearT = msgElapsed / SLACK_MSG_LAND_DUR
        // Opacity snaps to full in the first ~25% so the bubble is present
        // for the bounce rather than fading alongside it
        const opacity = Math.min(1, linearT * 4)
        const scale = 0.75 + (easeOutBack(linearT) * 0.25)
        return { opacity, scale }
      }
      return { opacity: 1, scale: 1 }
    }

    // Layer is always visible — individual cards manage their own opacity
    // through computeSlackCardState.
    function computeSlackCardsLayerOpacity() {
      return 1
    }

    // Keep showing the previous cycle's cards through the entire message
    // phase (loop carry + all 3 messages landing). Only after msg3 has
    // finished do the cards disappear for the brief SLACK_CARDS_GAP, then
    // sweep back in staggered with the rainbow shimmer. Matches the first
    // demo's "carry-over" pattern on the landing page.
    function computeSlackCardState(elapsed, cardIdx) {
      if (elapsed < SLACK_MSG_3_END) return { opacity: 1, sweepProgress: 1 }
      const cardShowStart = SLACK_CARDS_START + cardIdx * SLACK_CARD_STAGGER
      if (elapsed < cardShowStart) return { opacity: 0, sweepProgress: 0 }
      const cardElapsed = elapsed - cardShowStart
      return { opacity: 1, sweepProgress: Math.min(1, cardElapsed / SLACK_CARD_SWEEP) }
    }

    /* ── Build message rows: text and @mentions are split via regex,
       mentions get an accent span, everything uses textContent. ── */
    function buildMessageTextFragment(text, mentions) {
      const frag = document.createDocumentFragment()
      if (!mentions || mentions.length === 0) {
        frag.appendChild(document.createTextNode(text))
        return frag
      }
      const escaped = mentions.map((m) => m.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'))
      const regex = new RegExp(`(${escaped.join('|')})`, 'g')
      const parts = text.split(regex)
      for (const part of parts) {
        if (!part) continue
        if (mentions.includes(part)) {
          frag.appendChild(h('span', { class: 'text-[#8BA32E] font-medium' }, part))
        } else {
          frag.appendChild(document.createTextNode(part))
        }
      }
      return frag
    }

    // Slack 2024: consecutive messages from the same sender are grouped —
    // the avatar, name, and timestamp appear only on the first message.
    // Continuation rows show just the body, pulled close with negative margin.
    function buildMessageRow(msg, isGroupedContinuation) {
      const body = h('p', { class: 'text-[12px] text-[#1D1C1D] leading-relaxed break-words' })
      body.appendChild(buildMessageTextFragment(msg.text, msg.mentions))

      if (isGroupedContinuation) {
        // Invisible 7px-wide spacer where the avatar would be — keeps the
        // body column aligned with the avatar'd row above.
        const spacer = h('div', { class: 'w-7 shrink-0' })
        return h('div', {
          class: 'flex gap-2.5 -mt-2',
          style: 'transform-origin: left center;',
        }, [
          spacer,
          h('div', { class: 'flex-1 min-w-0' }, body),
        ])
      }

      const avatarInner = slackLogo()
      const avatar = h('div', {
        class: 'w-7 h-7 rounded-md shrink-0 flex items-center justify-center bg-white border border-[#E0DBD5] p-1',
      }, avatarInner)

      const header = h('div', { class: 'flex items-baseline gap-2 mb-0.5' }, [
        h('span', { class: 'text-[13px] font-bold text-[#1D1C1D]' }, msg.sender),
        h('span', { class: 'text-[10px] text-[#616061]' }, msg.timestamp),
      ])

      return h('div', {
        class: 'flex gap-2.5',
        style: 'transform-origin: left center;',
      }, [
        avatar,
        h('div', { class: 'flex-1 min-w-0' }, [header, body]),
      ])
    }

    /* ── Build extracted card — mirrors <AICard> in LandingPage.jsx ── */
    function buildCardRow(card) {
      const dotColor = LANDING_PRIORITY_DOT[card.priority]

      // Leading phosphor icon slot
      const phosphorFactory = PHOSPHOR_BY_NAME[card.icon]
      const iconNode = phosphorFactory ? phosphorFactory() : null
      const leadingSlot = h('div', { class: 'flex items-center pl-3 shrink-0' }, [
        h('div', { class: 'w-7 h-7 rounded-lg flex items-center justify-center bg-[#E8E2DB] text-[#8E8E89]' }, iconNode),
      ])

      // Labels row
      let labelsRow = null
      if (card.labels && card.labels.length > 0) {
        const labelSpans = card.labels.map((label) => {
          const s = LANDING_LABEL_BG[label.color]
          return h('span', {
            class: 'text-[10px] font-semibold px-2 py-0.5 rounded-full',
            style: `background-color: ${s.bg}; color: ${s.text};`,
          }, label.text)
        })
        labelsRow = h('div', { class: 'flex flex-wrap gap-1.5 mb-2' }, labelSpans)
      }

      // Task # + priority dot
      const taskMetaRow = h('div', { class: 'flex items-center gap-1.5 mb-0.5' }, [
        checkCircleIcon(),
        h('span', { class: 'text-[11px] font-medium text-[#5C5C57]' }, 'Task #' + card.taskNumber),
        h('span', { class: 'w-2 h-2 rounded-full', style: `background-color: ${dotColor};` }),
      ])

      // Title and (optional) description — both shimmer-reveal targets
      const titleEl = h('p', { class: 'card-title text-[13px] font-medium leading-snug ai-shimmer-reveal' }, card.title)
      const descEl = card.description
        ? h('p', { class: 'card-desc text-[12px] leading-relaxed mt-1 line-clamp-2 ai-shimmer-reveal' }, card.description)
        : null

      // Bottom meta row: due / checklist / description indicator + assignee
      const metaChildren = []
      if (card.dueDate) {
        metaChildren.push(h('span', {
          class: 'text-[10px] font-medium flex items-center gap-1 px-2 py-0.5 rounded-full bg-[#EEF2D6] text-[#A8BA32]',
        }, [calendarIcon(), card.dueDate]))
      }
      if (card.checklist) {
        metaChildren.push(h('span', {
          class: 'text-[10px] font-medium flex items-center gap-1 px-2 py-0.5 rounded-full bg-[#E8E2DB] text-[#8E8E89]',
        }, [checkSquareIcon(), `${card.checklist.done}/${card.checklist.total}`]))
      }
      if (card.description) {
        metaChildren.push(h('span', { class: 'text-[10px] flex items-center text-[#8E8E89]' }, alignLeftIcon()))
      }

      const assigneeEl = card.assignee
        ? h('span', {
            class: 'w-6 h-6 rounded-full shrink-0 flex items-center justify-center text-[10px] font-bold text-white bg-[#1B1B18]',
          }, card.assignee)
        : null

      const bottomRow = h('div', { class: 'flex items-center justify-between gap-2 mt-2.5' }, [
        h('div', { class: 'flex flex-wrap items-center gap-1.5 min-w-0' }, metaChildren),
        assigneeEl,
      ])

      const bodyChildren = [labelsRow, taskMetaRow, titleEl, descEl, bottomRow].filter(Boolean)
      const body = h('div', { class: 'flex-1 min-w-0 pl-2.5 pr-3.5 py-3' }, bodyChildren)

      return h('div', {
        class: 'relative overflow-hidden w-full rounded-xl border shadow-sm flex bg-white border-[#E0DBD5]',
      }, [leadingSlot, body])
    }

    /* ── Mount ── */
    const messagesRoot = document.getElementById('slack-messages')
    const messageEls = SLACK_MESSAGES.map((msg, idx) => {
      const isGroupedContinuation = idx > 0 && SLACK_MESSAGES[idx - 1].sender === msg.sender
      const el = buildMessageRow(msg, isGroupedContinuation)
      messagesRoot.appendChild(el)
      return el
    })

    const cardsRoot = document.getElementById('slack-cards')
    const cardEls = AI_CARDS.map((card) => {
      const el = buildCardRow(card)
      cardsRoot.appendChild(el)
      return el
    })

    const cardsLayer = document.getElementById('slack-cards-layer')

    /* ── Animation loop — ticks at 50ms, loops SLACK_TIMELINE_TOTAL ── */
    let elapsed = 0
    const TICK = 50
    setInterval(() => {
      elapsed = (elapsed + TICK >= SLACK_TIMELINE_TOTAL) ? 0 : elapsed + TICK

      for (let i = 0; i < messageEls.length; i++) {
        const s = computeSlackMessageState(elapsed, i)
        const el = messageEls[i]
        el.style.opacity = s.opacity
        el.style.transform = `scale(${s.scale})`
      }

      cardsLayer.style.opacity = computeSlackCardsLayerOpacity(elapsed)

      for (let i = 0; i < cardEls.length; i++) {
        const s = computeSlackCardState(elapsed, i)
        const el = cardEls[i]
        el.style.opacity = s.opacity
        const revealPct = (s.sweepProgress * 124 - 12) + '%'
        const shimmerNodes = el.querySelectorAll('.ai-shimmer-reveal')
        for (const n of shimmerNodes) n.style.setProperty('--reveal', revealPct)
      }
    }, TICK)
  </script>
</body>
</html>
